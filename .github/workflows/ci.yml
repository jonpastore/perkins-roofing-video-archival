name: ci
on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r app/requirements.txt pytest pytest-cov ruff
      - name: Lint gate
        run: ruff check core adapters api jobs
      - name: Test + coverage gate (core >= 97%)
        run: pytest tests/ --cov=core --cov-config=.coveragerc --cov-fail-under=97

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build SPA
        run: |
          cd web
          npm ci
          npm run build
